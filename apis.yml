      - type: SignUp
        url: https://novita.ai/
      - type: Pricing
        url: https://novita.ai/pricing
  - aid: novita-ai:gpu
    name: Novita AI GPU API
    description: >-
      On-demand GPU instance management and templates plus serverless GPU endpoints.
      Create, start, stop, and delete instances; list products and templates;
      query usage-based and fixed-term billing.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
