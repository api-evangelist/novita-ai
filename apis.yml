aid: novita-ai
url: https://raw.githubusercontent.com/api-evangelist/novita-ai/refs/heads/main/apis.yml
name: Novita AI
kind: company
description: >-
  Novita AI is an AI inference cloud offering serverless LLM, image, video, and audio
  generation APIs alongside on-demand GPU rentals and serverless GPU endpoints. Hosts
  open-source models with both native and OpenAI-compatible chat surfaces.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - AI
  - LLM
  - Inference
  - GPU
  - OpenAI Compatible
  - Image Generation
  - Video Generation
  - Audio
created: '2026-05-08'
modified: '2026-05-08'
specificationVersion: '0.19'
apis:
  - aid: novita-ai:platform
    name: Novita AI Platform API
    description: >-
      LLM chat completions (OpenAI-compatible), embeddings, reranking, batch, image
      generation (FLUX.1, Seedream 3.0/4.0, Qwen), image editing (upscale, background
      removal/replacement, inpaint), video (Hunyuan, Kling V2.1, Vidu Q1, MiniMax Hailuo),
      audio (TTS and ASR with MiniMax / GLM voices), authentication, billing, and account
      management. Native base URL https://api.novita.ai; OpenAI-compatible
      https://api.novita.ai/openai.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://novita.ai/docs/api-reference
    baseURL: https://api.novita.ai
    tags:
      - AI
      - LLM
      - Chat Completions
      - Embeddings
      - Reranking
      - Image Generation
      - Image Editing
      - Video Generation
      - Audio
      - Batch
    properties:
      - type: Documentation
        url: https://novita.ai/docs/
      - type: APIReference
        url: https://novita.ai/docs/api-reference
      - type: OpenAICompatibleBaseURL
        url: https://api.novita.ai/openai
      - type: SignUp
        url: https://novita.ai/
      - type: Pricing
        url: https://novita.ai/pricing
  - aid: novita-ai:gpu
    name: Novita AI GPU API
    description: >-
      GPU instance management API and serverless GPU endpoints. Supports usage-based and
      fixed-term billing.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://novita.ai/docs/
    baseURL: https://api.novita.ai
    tags:
